<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Whiteboard version control architecture diagram for Aetos">
  <rect width="1280" height="720" fill="#fbfaf6"/>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#2f2a24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="48" y="64" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#24201b">Version control for video cuts</text>
  <text x="50" y="96" font-family="monospace" font-size="16" fill="#7d7367">every agent attempt becomes a branch</text>

  <g fill="none" stroke="#2f2a24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M105 245 C265 244 360 245 490 245"/>
    <path d="M260 245 C340 150 450 148 555 150"/>
    <path d="M300 245 C390 338 485 340 585 340"/>
    <path d="M345 245 C460 445 610 438 735 438"/>
    <path d="M735 438 C820 438 880 398 940 340"/>
    <path d="M585 340 C720 340 820 340 940 340"/>
    <path d="M555 150 C710 150 820 235 940 340"/>
  </g>

  <g fill="#fffdf7" stroke="#2f2a24" stroke-width="2.5">
    <rect x="70" y="205" width="150" height="80" rx="16"/>
    <rect x="540" y="110" width="210" height="80" rx="16"/>
    <rect x="570" y="300" width="210" height="80" rx="16"/>
    <rect x="720" y="398" width="210" height="80" rx="16"/>
    <rect x="930" y="300" width="210" height="80" rx="16"/>
  </g>

  <g font-family="Verdana, sans-serif" fill="#24201b">
    <text x="104" y="238" font-size="20" font-weight="700">Main Cut</text>
    <text x="100" y="264" font-size="14">baseline</text>
    <text x="574" y="142" font-size="20" font-weight="700">Viral Branch</text>
    <text x="574" y="168" font-size="14">hook + pacing</text>
    <text x="604" y="332" font-size="20" font-weight="700">Story Branch</text>
    <text x="604" y="358" font-size="14">clip order</text>
    <text x="752" y="430" font-size="20" font-weight="700">Brand Branch</text>
    <text x="752" y="456" font-size="14">safe choices</text>
    <text x="970" y="332" font-size="20" font-weight="700">Selective Merge</text>
    <text x="970" y="358" font-size="14">best decisions</text>
  </g>

  <g fill="#f2a94e" stroke="#2f2a24" stroke-width="2">
    <circle cx="260" cy="245" r="9"/>
    <circle cx="300" cy="245" r="9"/>
    <circle cx="345" cy="245" r="9"/>
    <circle cx="940" cy="340" r="11"/>
  </g>

  <g font-family="monospace" fill="#7d7367" font-size="16">
    <text x="145" y="560">semantic diff: hook 8s -> 3s</text>
    <text x="145" y="590">semantic diff: CTA final frame -> 00:28</text>
    <text x="145" y="620">semantic diff: captions minimal -> bold</text>
  </g>
  <path d="M120 520 C295 505 505 520 725 512 C875 506 1030 510 1148 520" fill="none" stroke="#f2a94e" stroke-width="5" stroke-linecap="round"/>
</svg>
