<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Whiteboard system architecture diagram for Aetos">
  <rect width="1280" height="720" fill="#fbfaf6"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#d8d1c3" flood-opacity="0.75"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#2f2a24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="48" y="64" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#24201b">Aetos system overview</text>
  <text x="50" y="96" font-family="monospace" font-size="16" fill="#7d7367">whiteboard architecture / hackathon MVP</text>

  <g filter="url(#shadow)" fill="#fffdf7" stroke="#2f2a24" stroke-width="2.5" stroke-linecap="round">
    <rect x="70" y="190" width="190" height="92" rx="18"/>
    <rect x="330" y="190" width="210" height="92" rx="18"/>
    <rect x="615" y="128" width="230" height="92" rx="18"/>
    <rect x="615" y="270" width="230" height="92" rx="18"/>
    <rect x="920" y="128" width="230" height="92" rx="18"/>
    <rect x="920" y="270" width="230" height="92" rx="18"/>
    <rect x="330" y="468" width="230" height="92" rx="18"/>
    <rect x="625" y="468" width="230" height="92" rx="18"/>
    <rect x="920" y="468" width="230" height="92" rx="18"/>
  </g>

  <g font-family="Verdana, sans-serif" fill="#24201b">
    <text x="108" y="232" font-size="22" font-weight="700">Human team</text>
    <text x="105" y="258" font-size="15">editor / founder / client</text>

    <text x="370" y="232" font-size="22" font-weight="700">Next.js UI</text>
    <text x="365" y="258" font-size="15">landing + workspace</text>

    <text x="650" y="170" font-size="22" font-weight="700">VideoAgent API</text>
    <text x="650" y="196" font-size="15">route handler</text>

    <text x="650" y="312" font-size="22" font-weight="700">Zustand store</text>
    <text x="650" y="338" font-size="15">branches + activity</text>

    <text x="955" y="170" font-size="22" font-weight="700">Agent adapter</text>
    <text x="955" y="196" font-size="15">structured edit plans</text>

    <text x="955" y="312" font-size="22" font-weight="700">Timeline state</text>
    <text x="955" y="338" font-size="15">cuts / audio / captions</text>

    <text x="365" y="510" font-size="22" font-weight="700">Semantic diff</text>
    <text x="365" y="536" font-size="15">plain-language changes</text>

    <text x="660" y="510" font-size="22" font-weight="700">Memory engine</text>
    <text x="660" y="536" font-size="15">learns approvals</text>

    <text x="955" y="510" font-size="22" font-weight="700">Compare / merge</text>
    <text x="955" y="536" font-size="15">review decisions</text>
  </g>

  <g fill="none" stroke="#2f2a24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M260 236 C285 236 302 236 330 236"/>
    <path d="M540 218 C580 198 585 176 615 174"/>
    <path d="M540 252 C580 270 590 310 615 316"/>
    <path d="M845 174 C878 174 890 174 920 174"/>
    <path d="M1035 220 C1035 240 1035 250 1035 270"/>
    <path d="M920 316 C890 316 875 316 845 316"/>
    <path d="M445 282 C445 360 445 400 445 468"/>
    <path d="M730 362 C730 404 730 430 730 468"/>
    <path d="M845 515 C875 515 890 515 920 515"/>
  </g>

  <path d="M63 120 C250 105 455 117 640 112 C850 106 1050 110 1210 120" fill="none" stroke="#f2a94e" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
</svg>
